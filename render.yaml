services:
  # Backend API Service
  backend:
    type: pserv
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OLLAMA_MODEL
        value: gemma:2b
      - key: OLLAMA_BASE_URL
        value: https://campusgenie-ollama.onrender.com
      - key: CHROMA_HOST
        value: campusgenie-chroma.onrender.com
      - key: CHROMA_PORT
        value: 8000
      - key: CHROMA_COLLECTION
        value: campus_docs
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: 8080
      - key: MAX_UPLOAD_SIZE_MB
        value: 50
      - key: CHUNK_SIZE
        value: 500
      - key: CHUNK_OVERLAP
        value: 50
      - key: RETRIEVAL_TOP_K
        value: 5
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "*"

  # ChromaDB Vector Database
  chromadb:
    type: pserv
    runtime: python
    plan: free
    buildCommand: pip install chromadb==0.5.3
    startCommand: chroma run --host 0.0.0.0 --port $PORT --path /chroma/chroma
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"
      - key: PERSIST_DIRECTORY
        value: /chroma/chroma

  # Ollama LLM Service
  ollama:
    type: pserv
    runtime: python
    plan: free
    buildCommand: pip install ollama
    startCommand: ollama serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: OLLAMA_KEEP_ALIVE
        value: 24h

  # Frontend Streamlit App
  frontend:
    type: pserv
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        value: https://campusgenie-backend.onrender.com
      - key: API_TIMEOUT
        value: 120
