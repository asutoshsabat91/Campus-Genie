version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_MODEL=gemma:2b
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_COLLECTION=campus_docs
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
      - MAX_UPLOAD_SIZE_MB=50
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - RETRIEVAL_TOP_K=5
      - UPLOAD_DIR=/app/uploads
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=*
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - chromadb
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: campusgenie_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: campusgenie_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Frontend Streamlit App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8080
      - API_TIMEOUT=120
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  chroma_data:
  ollama_data:

networks:
  campusgenie_net:
    driver: bridge
